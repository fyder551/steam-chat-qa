<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0e1621; font-family: 'Segoe UI', system-ui; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { display: flex; width: 1000px; background: #17212b; border-radius: 24px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .register-form { width: 50%; padding: 48px 32px; color: white; }
        .register-form h2 { margin-bottom: 24px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #a2b1c6; }
        .input-group input { width: 100%; background: #242f3d; border: none; padding: 12px; border-radius: 12px; color: white; font-size: 1rem; }
        button { width: 100%; background: #2b5278; border: none; padding: 12px; border-radius: 30px; color: white; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 16px; }
        .login-link { margin-top: 20px; text-align: center; font-size: 0.85rem; }
        .login-link a { color: #71a7cf; text-decoration: none; }
        .logo-area { width: 50%; background: #1e2a36; display: flex; align-items: center; justify-content: center; }
        .flash-error { margin-top: 16px; background: #3e2a2a; padding: 10px; border-radius: 12px; color: #ff8a7a; font-size: 0.8rem; text-align: center; }
        .flash-success { margin-top: 16px; background: #1e3a2a; padding: 10px; border-radius: 12px; color: #8aff7a; font-size: 0.8rem; text-align: center; }
        .error-message { color: #ff8a7a; font-size: 0.7rem; margin-top: 4px; }
    </style>
</head>
<body>
<div class="container">
    <div class="register-form">
        <h2>Регистрация</h2>
        <form method="post" id="registerForm">
            <div class="input-group">
                <label>Логин</label>
                <input type="text" name="username" id="username" required>
                <div class="error-message" id="usernameError"></div>
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Зарегистрироваться</button>
        </form>
        <div class="login-link">
            Уже есть аккаунт? <a href="/">Войти</a>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="flash-{{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>
    <div class="logo-area">
        <svg width="180" height="180" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="48" fill="#1b2838" stroke="#2a6e85" stroke-width="4"/>
            <path d="M50 18 L74 36 L74 64 L50 82 L26 64 L26 36 Z" fill="none" stroke="#66c0f4" stroke-width="5"/>
            <circle cx="50" cy="50" r="14" fill="#66c0f4"/>
            <path d="M50 36 L58 50 L42 50 Z" fill="#1b2838"/>
            <rect x="46" y="22" width="8" height="18" fill="#66c0f4" rx="3"/>
            <rect x="46" y="60" width="8" height="18" fill="#66c0f4" rx="3"/>
            <rect x="22" y="46" width="18" height="8" fill="#66c0f4" rx="3"/>
            <rect x="60" y="46" width="18" height="8" fill="#66c0f4" rx="3"/>
        </svg>
    </div>
</div>
<script>
    const usernameInput = document.getElementById('username');
    const usernameError = document.getElementById('usernameError');
    function validateLogin(login) {
        const regex = /^[A-Z][A-Za-z0-9]{7,}$/;
        return regex.test(login);
    }
    usernameInput.addEventListener('input', function() {
        const value = this.value;
        if (value.length === 0) { usernameError.textContent = ''; return; }
        if (!validateLogin(value)) {
            usernameError.textContent = 'Логин должен начинаться с заглавной латинской буквы и содержать минимум 8 символов (только буквы и цифры)';
        } else {
            usernameError.textContent = '';
        }
    });
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        if (!validateLogin(usernameInput.value)) {
            e.preventDefault();
            usernameError.textContent = 'Неверный формат логина. Пример: Admin123';
        }
    });
</script>
</body>
</html>
